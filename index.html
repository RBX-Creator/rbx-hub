<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hub</title>
    <style>
        body {
            background-color: #000000; /* Reines Schwarz */
            color: #ffffff; /* Hellweiß */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ffffff; /* Hellweiß */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* Weißer Glow */
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #888888; /* Clean-Grau */
            font-size: 1rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 2x2 Kachel-Raster in Schwarz-Weiß */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 440px;
            margin: 0 auto 35px auto;
            padding: 0 10px;
        }

        .stat-card {
            background-color: #111111; /* Dunkelgrau */
            border-radius: 12px;
            padding: 20px 10px;
            border: 1px solid #333333; /* Dezenter grauer Rand */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff; /* Hellweiß */
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #777777;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Key System Bereich */
        .key-box {
            background: #111111;
            border: 2px solid #ffffff; /* Weißer Rahmen */
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto 40px auto;
        }

        .key-box h3 {
            color: #ffffff;
            margin-top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            background-color: #000000;
            border: 1px solid #444444;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 8px #ffffff;
            border-color: #ffffff;
        }

        .submit-btn {
            background-color: #111111;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 90%;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 12px #ffffff;
        }

        .status-message {
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Grid & Blöcke */
        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto 40px auto;
        }

        .block {
            background: #111111;
            border: 2px solid #333333;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            opacity: 0.3;
            pointer-events: none;
        }

        .block.unlocked {
            opacity: 1;
            pointer-events: auto;
            border-color: #ffffff; /* Weißer Rand wenn freigeschaltet */
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .block:hover.unlocked {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
        }

        .block h2 {
            margin-top: 0;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .block p {
            color: #888888;
            font-size: 0.95rem;
        }

        .copy-btn {
            background-color: #111111;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            box-shadow: 0 0 10px #ffffff;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .copy-btn.copied {
            background-color: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
            box-shadow: 0 0 15px #ffffff !important;
        }

        .game-banner {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        /* Socials Footer */
        .socials-footer {
            margin-top: 50px;
            padding: 20px;
            background-color: #111111;
            border-top: 1px solid #333333;
        }

        .socials-footer h4 {
            color: #ffffff;
            margin-bottom: 15px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-links a {
            color: #ffffff;
            text-decoration: none;
            background: #000000;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333333;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .social-links a:hover {
            box-shadow: 0 0 10px #ffffff;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>MY HUB</h1>
    <div class="subtitle">Personal Script & Project Dashboard</div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-value">Custom</span>
            <span class="stat-label">Scripts</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">Active</span>
            <span class="stat-label">Status</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">Private</span>
            <span class="stat-label">Access</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">1.0</span>
            <span class="stat-label">Version</span>
        </div>
    </div>

    <div class="key-box">
        <h3>🔑 Enter Key to Unlock Hub</h3>
        <input type="text" id="keyInput" placeholder="Enter Key Here...">
        <button class="submit-btn" onclick="checkKey()">Submit Key</button>
        <div id="status" class="status-message" style="color: #888888;">Locked 🔒</div>
    </div>

    <div class="hub-container">

        <div class="block" id="block1">
            <img src="https://images.prodia.xyz/744fb8f0-48fe-4098-824e-0f09d455d4f5.png" alt="Script Banner" class="game-banner">
            <h2>⚡ Main Project Script</h2>
            <p>Your custom execution features and settings</p>
            <button class="copy-btn" onclick="copyScript(this, `print('Hello World')`)">Copy Script</button>
        </div>

    </div>

    <div class="socials-footer">
        <h4>🔗 Community & Links</h4>
        <div class="social-links">
            <a href="https://discord.gg/" target="_blank">💬 Discord Server</a>
        </div>
    </div>

    <script>
        // Setze hier deinen gewünschten Key ein
        const correctKey = "mein-key"; 

        function checkKey() {
            const input = document.getElementById("keyInput").value.toLowerCase().trim();
            const status = document.getElementById("status");
            const blocks = document.querySelectorAll(".block");

            if (input === correctKey) {
                status.innerText = "Access Granted! ✅ Unlocked";
                status.style.color = "#ffffff";
                document.getElementById("keyInput").style.borderColor = "#ffffff";
                
                blocks.forEach(block => {
                    block.classList.add("unlocked");
                });
            } else if (input === "") {
                status.innerText = "Please enter a key! ⚠️";
                document.getElementById("keyInput").style.borderColor = "#ffffff";
                
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            } else {
                status.innerText = "Wrong Key! ❌ Try Again";
                status.style.color = "#ff4b4b";
                document.getElementById("keyInput").style.borderColor = "#ff4b4b";
                
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            }
        }

        function copyScript(button, scriptText) {
            navigator.clipboard.writeText(scriptText).then(() => {
                const originalText = button.innerText;
                button.innerText = "Copied! ✅";
                button.classList.add("copied");
                
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove("copied");
                }, 2000);
            }).catch(err => {
                alert("Fehler beim Kopieren: " + err);
            });
        }
    </script>

</body>
</html>
